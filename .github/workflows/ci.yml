name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · build · unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Lint is informational for now (known React-Compiler false positives); it
      # does not gate the build until the eslint config is finalised.
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
      - run: npm test

  backend:
    name: Backend (type-check / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build

  firestore-rules:
    name: Firestore security-rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tests/package-lock.json
      # The Firestore emulator runs on the JVM; firebase-tools v15 will require JDK 21+.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install test dependencies
        working-directory: tests
        run: npm ci
      - name: Run rules tests against the Firestore emulator
        run: npx -y firebase-tools emulators:exec --only firestore --project demo-nso-portal "npm --prefix tests test"
