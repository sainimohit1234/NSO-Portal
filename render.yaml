services:
  # Backend Web Service
  - type: web
    name: nsm-portal-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx ts-node src/index.ts
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: nsm-portal-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
